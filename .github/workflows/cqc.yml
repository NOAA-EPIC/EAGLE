name: Code Quality Checks
on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
  workflow_dispatch:
jobs:
  code-quality-checks:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    steps:
      - name: Check Out Code
        uses: actions/checkout@v3
      - name: Build Runtime Environment
        run: |
          set -euo pipefail
          time make -C src devenv cudascript=dummy
          . src/conda/etc/profile.d/conda.sh
      - name: Check Formatting
        run: |
          make -C src format
          if [[ -n "$(git status --porcelain --untracked-files=no)" ]]; then
            git --no-pager diff
            echo UNFORMATTED CODE DETECTED
            exit 1
          fi
          echo ALL GOOD
      - name: Run Python Linter
        run: make -C src lint
      - name: Run Python Typechecker
        run: make -C src typecheck
      - name: Run Shell Checker
        run: make -C src shellcheck
      - name: Run YAML Linter
        run: make -C src yamllint
