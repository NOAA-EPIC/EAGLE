name: Code Quality Checks
env:
  CONDA_CACHE_KEY: ${{ runner.os }}-conda-${{ github.ref_name }}
on:
  pull_request:
    branches:
      - '**'
  push:
    branches:
      - '**'
  workflow_dispatch:
    branches:
      - '**'
jobs:
  code-quality-checks:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    steps:
      - name: Check Out Code
        uses: actions/checkout@v3
#         with:
#           clean: false
      - name: Restore Conda
        uses: actions/cache/restore@v5
        with:
          path: src/conda
          key: $CONDA_CACHE_KEY
      - name: Build Runtime Environment
        run: time make -C src devenv cudascript=dummy
      - name: Cache Conda
        uses: actions/cache/save@v5
        with:
          path: src/conda
          key: $CONDA_CACHE_KEY
      - name: Check Formatting
        run: |
          make -C src format
          if [[ -n "$(git status --porcelain)" ]]; then
            git --no-pager diff
            echo UNFORMATTED CODE DETECTED
            exit 1
          fi
          echo NO FORMATTING ISSUES DETECTED
