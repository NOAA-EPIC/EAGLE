name: Code Quality Checks
on:
  pull_request:
    branches:
      - '**'
  push:
    branches:
      - '**'
  workflow_dispatch:
    branches:
      - '**'
jobs:
  code-quality-checks:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    steps:
      - name: Check Out Code
        uses: actions/checkout@v3
        with:
          clean: false
      - name: Build Runtime Environment
        run: time make -C src devenv cudascript=dummy
      - name: Check Formatting
        run: |
          make -C src format
          if [[ -n "$(git status --porcelain)" ]]; then
            git --no-pager diff
            echo UNFORMATTED CODE DETECTED
            exit 1
          fi
