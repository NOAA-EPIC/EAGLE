name: Nested Eagle CI Pipeline (uwtools)

on:
  pull_request_review:
    types: [submitted]

concurrency:
  group: nested-eagle-ci-${{ github.event.pull_request.number }}
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  run_pipeline:
    name: Run Nested EAGLE end-to-end on Ursa
    if: >-
      ${{
        github.event.review.state == 'approved' &&
        !contains(github.event.pull_request.labels.*.name, 'ci-running')
      }}
    runs-on: ursa
    timeout-minutes: 1440

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          fetch-depth: 0

      - name: Gate on nested_eagle/ or src/ changes
        id: gate
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const { owner, repo } = context.repo;

            let page = 1;
            const per_page = 100;
            const files = [];
            while (true) {
              const resp = await github.rest.pulls.listFiles({
                owner, repo, pull_number: pr.number, per_page, page
              });
              files.push(...resp.data.map(f => f.filename));
              if (resp.data.length < per_page) break;
              page += 1;
            }

            const relevant = files.some(f => f.startsWith("nested_eagle/") || f.startsWith("src/"));
            core.info(`Changed files: ${files.length}`);
            core.info(`Relevant changes: ${relevant}`);
            core.setOutput("relevant", relevant ? "true" : "false");

      - name: Skip (no relevant changes)
        if: steps.gate.outputs.relevant != 'true'
        run: |
          echo "No changes under nested_eagle/ or src/. Skipping."
          exit 0

      - name: Add ci-running label
        uses: actions-ecosystem/action-add-labels@v1
        with:
          labels: ci-running
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bootstrap repo conda (if missing, with retries and workspace cache)
        run: |
          set -euo pipefail
          cd "${GITHUB_WORKSPACE}/src"

          if [ -f conda/etc/profile.d/conda.sh ]; then
            echo "Found existing repo conda at src/conda; reusing."
            exit 0
          fi

          echo "src/conda not found; bootstrapping Miniforge + envs (may take a while)..."

          # Put ALL caches/temp under the workflow workspace to avoid HOME quota.
          export XDG_CACHE_HOME="${GITHUB_WORKSPACE}/.cache"
          export TMPDIR="${GITHUB_WORKSPACE}/.tmp"
          export CONDA_PKGS_DIRS="${GITHUB_WORKSPACE}/.conda/pkgs"
          export CONDARC="${GITHUB_WORKSPACE}/.condarc"
          mkdir -p "${XDG_CACHE_HOME}" "${TMPDIR}" "${CONDA_PKGS_DIRS}"

          # Force conda to use workspace package cache (not ~/.conda/pkgs)
          cat > "${CONDARC}" <<'EOF'
          pkgs_dirs:
            - ./.conda/pkgs
          EOF

          for attempt in 1 2 3; do
            echo "Bootstrap attempt ${attempt}/3"
            if make env cudascript=ursa; then
              echo "Bootstrap succeeded."
              exit 0
            fi
            echo "Bootstrap failed (attempt ${attempt}). Sleeping 60s then retrying..."
            sleep 60
          done

          echo "Bootstrap failed after 3 attempts."
          exit 1

      - name: Run pipeline via src/Makefile + uwtools
        env:
          PR_NUM: ${{ github.event.pull_request.number }}
          SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          cd "${GITHUB_WORKSPACE}/src"

          # ---- helpers ----
          slurm_wait() {
            local job_id="$1"
            local label="${2:-job}"
            local prev=""
            echo "Waiting for ${label} job ${job_id} ..."

            while true; do
              local state=""
              state="$(squeue -h -j "$job_id" -o "%T" 2>/dev/null || true)"
              if [[ -z "$state" ]]; then
                state="$(sacct -j "$job_id" --format=State --noheader 2>/dev/null | head -n1 | awk '{print $1}')"
                state="${state:-UNKNOWN}"
              fi

              if [[ "$state" != "$prev" ]]; then
                echo "${label} (${job_id}) state: ${state}"
                prev="$state"
              fi

              case "$state" in
                COMPLETED) echo "${label} (${job_id}) COMPLETED"; break ;;
                FAILED*|CANCELLED*|TIMEOUT*|NODE_FAIL*|OUT_OF_MEMORY*)
                  echo "${label} (${job_id}) terminal failure: ${state}"
                  return 1
                  ;;
              esac
              sleep 20
            done
            return 0
          }

          # Wait for a runscript marker set:
          #   runscript.<t>.submit contains the job id (if batch)
          #   runscript.<t>.done indicates success
          #   runscript.<t>.out is stdout/stderr
          wait_runscript_batch() {
            local dir="$1"
            local target="$2"   # e.g., training, inference, zarr, wxvx
            local label="${3:-$target}"

            local submit="${dir}/runscript.${target}.submit"
            local done="${dir}/runscript.${target}.done"
            local out="${dir}/runscript.${target}.out"

            if [[ ! -f "$submit" ]]; then
              echo "ERROR: Missing submit file: $submit"
              echo "Tip: check directory contents: $dir"
              ls -la "$dir" || true
              exit 1
            fi

            local job_id
            job_id="$(tr -d '[:space:]' < "$submit" | tail -n1)"
            if [[ -z "$job_id" ]]; then
              echo "ERROR: Empty job id in $submit"
              exit 1
            fi

            if ! slurm_wait "$job_id" "$label"; then
              echo "----- ${label} failed; showing ${out} (if present) -----"
              [[ -f "$out" ]] && tail -n 200 "$out" || echo "No out file at $out"
              exit 1
            fi

            if [[ ! -f "$done" ]]; then
              echo "ERROR: Job completed but .done marker missing: $done"
              echo "----- showing ${out} (if present) -----"
              [[ -f "$out" ]] && tail -n 200 "$out" || echo "No out file at $out"
              exit 1
            fi
          }

          # ---- build config ----
          EXP="ci-pr${PR_NUM}-$(echo "$SHA" | cut -c1-7)"
          echo "Experiment name: $EXP"

          make config compose=base:ursa > eagle.yaml

          # Set app.base and experiment_name for this CI run.
          SRC_ABS="${GITHUB_WORKSPACE}/src"
          sed -i "s|^\\(  base:\\s*\\).*|\\1${SRC_ABS}|" eagle.yaml
          sed -i "s|^\\(  experiment_name:\\s*\\).*|\\1${EXP}|" eagle.yaml

          make validate config=eagle.yaml

          RUNROOT="${SRC_ABS}/run/${EXP}"

          # ---- pipeline steps ----
          # local
          make grids-and-meshes config=eagle.yaml

          # batch: zarr-gfs and zarr-hrrr both use the Zarr driver (runscript.zarr.* markers)
          make zarr-gfs  config=eagle.yaml
          wait_runscript_batch "${RUNROOT}/data" "zarr" "Zarr GFS"

          make zarr-hrrr config=eagle.yaml
          wait_runscript_batch "${RUNROOT}/data" "zarr" "Zarr HRRR"

          # batch
          make training config=eagle.yaml
          wait_runscript_batch "${RUNROOT}/training" "training" "Training"

          make inference config=eagle.yaml
          wait_runscript_batch "${RUNROOT}/inference" "inference" "Inference"

          # local postprocess
          make prewxvx-global config=eagle.yaml
          make prewxvx-lam    config=eagle.yaml

          # batch: wxvx driver writes run/<exp>/vx/<truth>/<extent>/runscript.wxvx.*
          make vx-grid-global config=eagle.yaml
          wait_runscript_batch "${RUNROOT}/vx/grid2grid/global" "wxvx" "VX grid2grid global"

          make vx-grid-lam config=eagle.yaml
          wait_runscript_batch "${RUNROOT}/vx/grid2grid/lam" "wxvx" "VX grid2grid lam"

          make vx-obs-global config=eagle.yaml
          wait_runscript_batch "${RUNROOT}/vx/grid2obs/global" "wxvx" "VX grid2obs global"

          make vx-obs-lam config=eagle.yaml
          wait_runscript_batch "${RUNROOT}/vx/grid2obs/lam" "wxvx" "VX grid2obs lam"

          # basic artifact checks (README documents .stat + .png locations)
          find "${RUNROOT}/vx" -type f -name "*.png" -print -quit | grep -q . || {
            echo "ERROR: No verification PNGs found under ${RUNROOT}/vx"
            exit 1
          }
          find "${RUNROOT}/vx" -type f -name "*.stat" -print -quit | grep -q . || {
            echo "ERROR: No verification .stat files found under ${RUNROOT}/vx"
            exit 1
          }

          echo "Nested EAGLE CI pipeline completed successfully."

  cleanup_label:
    name: Cleanup ci-running label
    runs-on: ubuntu-latest
    if: always()
    needs: [run_pipeline]
    steps:
      - name: Remove ci-running label
        uses: mondeja/remove-labels-gh-action@v2.0.0
        with:
          labels: ci-running
          token: ${{ secrets.GITHUB_TOKEN }}
