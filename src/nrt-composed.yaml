app:
  base: /scratch3/NAGAPE/epic/Wei.Huang/src/EAGLE/src
  experiment_name: wei_learning_nrt
  gpu:
    batchargs:
      --gres: gpu:h100:1
      nodes: 1
      partition: u1-h100
      queue: gpuwf
  partitions:
    netaccess: u1-service
  platform:
    account: epic
    scheduler: slurm
  rundir: '{{ app.base }}/run/{{ app.experiment_name }}/nrt_inference/{{ app.time.inference_start.strftime("%Y/%m/%d/%H") }}'
  time:
    freq: '{{ (app.time.step.total_seconds() / 3600) | int }}h'
    inference_start: !datetime '{{ app.nrt.inference_start }}'
    inference_stop: !datetime '{{ app.time.inference_start }}'
    leadtime: !int '{{ (app.nrt.leadtime.total_seconds() / 3600) | int }}'
    multistep_input: 1
    start: !datetime '{{ app.nrt.ic_start }}'
    step: !timedelta '6'
    stop: !datetime '{{ app.nrt.stop }}'
  launcher: srun --export=ALL
  nrt:
    multistep_input_offset: !timedelta '0'
    now: !datetime '{{ "NOW" | env }}'
    ic_start: !datetime '{{ app.nrt.inference_start - app.nrt.multistep_input_offset }}'
    inference_start: !datetime '{{ app.nrt.now - app.nrt.offset - app.nrt.latency }}'
    latency: !timedelta '6'
    leadtime: !timedelta '48'
    offset: !timedelta '0:0:{{ (app.nrt.now.timestamp() % 21600) | int }}'
    stop: !datetime '{{ app.nrt.inference_start + app.nrt.leadtime }}'
grids_and_meshes:
  filenames:
    gfs_target_grid: '{{ val.filenames.gfs_target_grid }}'
    hrrr_target_grid: '{{ val.filenames.hrrr_target_grid }}'
    latent_mesh: '{{ val.filenames.latent_mesh }}'
  rundir: '{{ app.base }}/run/{{ app.experiment_name }}/data'
  global_grid_resolution_deg: 1.0
  latent_mesh_global_resolution_deg: 2.0
  conus_grid_resolution_km: 15
  latent_mesh_conus_coarsen_factor: 2
inference:
  anemoi:
    checkpoint_path: '{{ app.base }}/run/{{ app.experiment_name }}/checkpoint'
    end_date: !datetime '{{ app.time.inference_stop }}'
    freq: '{{ app.time.freq }}'
    lead_time: !int '{{ app.time.leadtime }}'
    output_path: '{{ inference.rundir }}/output'
    start_date: !datetime '{{ app.time.inference_start }}'
    use_mpi: true
    input_dataset_kwargs:
      adjust: all
      cutout:
      - dataset: '{{ val.data.rundir }}/hrrr.zarr'
        trim_edge:
        - 10
        - 11
        - 10
        - 11
      - dataset: '{{ val.data.rundir }}/gfs.zarr'
      min_distance_km: 0
  checkpoint_dir: '{{ app.base }}/run/{{ app.experiment_name }}/training/outputs/checkpoint'
  execution:
    batchargs:
      --gres: gpu:h100:1
      nodes: 1
      partition: u1-h100
      queue: gpuwf
      export: false
      memory: 16G
      rundir: '{{ inference.rundir }}'
      walltime: 00:10:00
    envcmds: !list '{{ val.slurm_script + val.inference.envcmds  }}'
    executable: '{{ app.launcher | default("") }} eagle-tools inference inference.yaml'
  rundir: '{{ app.rundir }}/inference'
platform: !dict '{{ app.platform }}'
training: !remove ''
ufs2arco:
  dirs:
    cache: cache/X
    logs: logs/X
    zarr: X.zarr
  mover:
    name: datamover
    batch_size: 2
  regridder:
    method: conservative
    reuse_weights: true
  slices:
    sel:
      latitude:
      - 89.9
      - -89.9
  source:
    analysis: !remove ''
    forecast: !remove ''
    fhr:
      start: 0
      step: !int '{{ val.step }}'
      end: 0
    levels: !list '{{ val.levels }}'
    t0:
      start: '{{ (app.time.start).strftime("%Y-%m-%dT%H") }}'
      freq: '{{ val.step }}h'
      end: '{{ (app.time.stop).strftime("%Y-%m-%dT%H") }}'
    variables: !list '{{ val.variables }}'
  target:
    chunks:
      cell: -1
      ensemble: 1
      time: 1
      variable: -1
    compute_temporal_residual_statistics: true
    forcings:
    - cos_latitude
    - sin_latitude
    - cos_longitude
    - sin_longitude
    - cos_julian_day
    - sin_julian_day
    - cos_local_time
    - sin_local_time
    - insolation
    name: anemoi_inference_with_forcings
    sort_channels_by_levels: true
    statistics_period: !remove ''
    multistep_input: !int '{{ app.time.multistep_input }}'
val:
  conda: '{{ app.base }}/conda'
  data:
    rundir: '{{ app.rundir }}/data'
  filenames:
    gfs_target_grid: global_one_degree.nc
    hrrr_target_grid: hrrr_15km.nc
    latent_mesh: latentx2.spongex1.combined.sorted.npz
  inference:
    envcmds:
    - source {{ val.conda }}/etc/profile.d/conda.sh
    - conda activate anemoi
    - set -ex
  levels:
  - 100
  - 150
  - 200
  - 250
  - 300
  - 400
  - 500
  - 600
  - 700
  - 850
  - 925
  - 1000
  statsdelta: !remove ''
  step: !int '{{ (app.time.step.total_seconds() / 3600) | int }}'
  training:
    envcmds:
    - source {{ val.conda }}/etc/profile.d/conda.sh
    - conda activate anemoi
    - export MLFLOW_ALLOW_FILE_STORE=true
    - export SLURM_GPUS_PER_NODE=1
    - export LD_LIBRARY_PATH=$CONDA_PREFIX/lib:$LD_LIBRARY_PATH
    - set -ex
  variables:
  - gh
  - u
  - v
  - w
  - t
  - q
  - sp
  - u10
  - v10
  - t2m
  - t_surface
  - sh2
  - lsm
  - orog
  visualization:
    rundir: '{{ app.rundir }}/visualization'
  vx:
    rundir: '{{ app.rundir }}/vx'
  zarrs:
    envcmds:
    - source {{ val.conda }}/etc/profile.d/conda.sh
    - conda activate data
    - set -ex
  slurm_script:
  - source /etc/profile.d/profile-slurm.sh
visualization:
  common:
    postwxvx:
      start_date: !datetime '{{ app.time.inference_start }}'
      end_date: !datetime '{{ app.time.inference_stop }}'
      freq: '{{ app.time.freq }}'
      leadtimes:
        start: 0
        end: 24
        step: !int '{{ val.step }}'
      variable_prefixes:
      - 2t_heightAboveGround_0002
      - 10u_heightAboveGround_0010
      - 10v_heightAboveGround_0010
      - gh_isobaricInhPa_0500
      - t_isobaricInhPa_0850
      - u_isobaricInhPa_0250
      - v_isobaricInhPa_0250
      - sp_surface
    spatial_stat_plots:
      add_states: false
      cmap: RdBu_r
      figsize:
        h: 9.75
        w: 4.875
      file_fontsize: 8.0
      gridlines: false
      stats_root: '{{ val.vx.rundir }}/grid2grid/%s/run/stats'
      suptitle_y: 0.995
      title_fontsize: 11.0
    stats:
    - RMSE
    variables:
    - 2m_temperature
    - 10m_zonal_wind
    - 10m_meridional_wind
    - 500hpa_geopotential_height
    - 850hpa_temperature
    - 250hpa_zonal_wind
    - 250hpa_meridional_wind
    - surface_pressure
  grid2grid:
    global:
      visualization:
        eagle_tools:
          start_date: !datetime '{{ app.time.inference_start }}'
          end_date: !datetime '{{ app.time.inference_stop }}'
          freq: '{{ app.time.freq }}'
          leadtimes:
            start: 0
            end: 24
            step: !int '{{ val.step }}'
          variable_prefixes:
          - 2t_heightAboveGround_0002
          - 10u_heightAboveGround_0010
          - 10v_heightAboveGround_0010
          - gh_isobaricInhPa_0500
          - t_isobaricInhPa_0850
          - u_isobaricInhPa_0250
          - v_isobaricInhPa_0250
          - sp_surface
          work_path: '{{ val.vx.rundir }}/grid2grid/global'
          stat_prefix: grid_stat_nested_global
        name: grid-global
        rundir: '{{ val.visualization.rundir }}/grid2grid/global'
        spatial_stat_plots: !dict '{{ visualization.common.spatial_stat_plots }}'
        stats: !list '{{ visualization.common.stats }}'
        variables: !list '{{ visualization.common.variables }}'
    lam:
      visualization:
        eagle_tools:
          start_date: !datetime '{{ app.time.inference_start }}'
          end_date: !datetime '{{ app.time.inference_stop }}'
          freq: '{{ app.time.freq }}'
          leadtimes: !dict '{{ visualization.common.postwxvx.leadtimes }}'
          stat_prefix: grid_stat_nested_lam
          variable_prefixes: !list '{{ visualization.common.postwxvx.variable_prefixes }}'
          work_path: '{{ val.vx.rundir }}/grid2grid/lam'
        name: grid-lam
        rundir: '{{ val.visualization.rundir }}/grid2grid/lam'
        spatial_stat_plots: !dict '{{ visualization.common.spatial_stat_plots }}'
        stats: !list '{{ visualization.common.stats }}'
        variables: !list '{{ visualization.common.variables }}'
  grid2obs:
    global:
      visualization:
        eagle_tools:
          start_date: !datetime '{{ app.time.inference_start }}'
          end_date: !datetime '{{ app.time.inference_stop }}'
          freq: '{{ app.time.freq }}'
          leadtimes:
            start: 0
            end: 24
            step: !int '{{ val.step }}'
          variable_prefixes:
          - 2t_heightAboveGround_0002
          - 10u_heightAboveGround_0010
          - 10v_heightAboveGround_0010
          - gh_isobaricInhPa_0500
          - t_isobaricInhPa_0850
          - u_isobaricInhPa_0250
          - v_isobaricInhPa_0250
          - sp_surface
          work_path: '{{ val.vx.rundir }}/grid2obs/global/'
          stat_prefix: point_stat_nested_global
        name: obs-global
        rundir: '{{ val.visualization.rundir }}/grid2obs/global'
        stats: !list '{{ visualization.common.stats }}'
        variables: !list '{{ visualization.common.variables }}'
    lam:
      visualization:
        eagle_tools:
          start_date: !datetime '{{ app.time.inference_start }}'
          end_date: !datetime '{{ app.time.inference_stop }}'
          freq: '{{ app.time.freq }}'
          leadtimes: !dict '{{ visualization.common.postwxvx.leadtimes }}'
          stat_prefix: point_stat_nested_lam
          variable_prefixes: !list '{{ visualization.common.postwxvx.variable_prefixes }}'
          work_path: '{{ val.vx.rundir }}/grid2obs/lam/'
        name: obs-lam
        rundir: '{{ val.visualization.rundir }}/grid2obs/lam'
        stats: !list '{{ visualization.common.stats }}'
        variables: !list '{{ visualization.common.variables }}'
vx:
  common:
    execution:
      batchargs:
        cores: 1
        export: false
        partition: '{{ app.partitions.netaccess }}'
        walltime: 00:30:00
      envcmds:
      - source {{ val.conda }}/etc/profile.d/conda.sh
      - conda activate wxvx
      - set -ex
    paths_grid:
      grids:
        forecast: '{{ val.vx.rundir }}/TRUTH/EXTENT/grids/forecast'
        truth: '{{ val.vx.rundir }}/TRUTH/EXTENT/grids/truth'
      run: '{{ val.vx.rundir }}/TRUTH/EXTENT/run'
    paths_obs:
      grids:
        forecast: '{{ val.vx.rundir }}/TRUTH/EXTENT/forecast'
      obs: '{{ val.vx.rundir }}/TRUTH/EXTENT/obs'
      run: '{{ val.vx.rundir }}/TRUTH/EXTENT/run'
    wxvx:
      cycles:
        start: !datetime '{{ app.time.inference_start }}'
        step: 0
        stop: !datetime '{{ app.time.inference_stop }}'
      forecast:
        coords:
          latitude: latitude
          level: level
          longitude: longitude
          time:
            inittime: forecast_reference_time
            validtime: time
      leadtimes:
        start: '{{ app.time.leadtime }}'
        step: '{{ app.time.step }}'
        stop: '{{ app.time.leadtime }}'
      meta:
        workdir: '{{ val.vx.rundir }}/TRUTH/EXTENT'
        grids: '{{ val.vx.rundir }}/TRUTH/EXTENT/grids'
        post_files: '{{ val.vx.rundir }}/postprocessed_files/EXTENT'
      variables:
        t2m:
          level_type: heightAboveGround
          levels:
          - 2
          name: 2t
        gh:
          level_type: isobaricInhPa
          levels:
          - 500
          name: gh
        sp:
          level_type: surface
          name: sp
        t:
          level_type: isobaricInhPa
          levels:
          - 850
          name: t
        u:
          level_type: isobaricInhPa
          levels:
          - 250
          name: u
        u10:
          level_type: heightAboveGround
          levels:
          - 10
          name: 10u
        v:
          level_type: isobaricInhPa
          levels:
          - 250
          name: v
        v10:
          level_type: heightAboveGround
          levels:
          - 10
          name: 10v
  grid2grid:
    global:
      platform: !dict '{{ app.platform }}'
      wxvx:
        execution:
          batchargs:
            cores: 1
            export: false
            partition: '{{ app.partitions.netaccess }}'
            walltime: 00:30:00
            rundir: '{{ vx.grid2grid.global.wxvx.rundir }}'
          envcmds: !list '{{ vx.common.execution.envcmds }}'
          executable: wxvx -c wxvx-grid2grid-global.yaml -t plots -f
        name: grid2grid-global
        prewxvx: !dict '{{ prewxvx.global.prewxvx }}'
        rundir: '{{ val.vx.rundir }}/grid2grid/global'
        wxvx:
          cycles:
            start: !datetime '{{ app.time.inference_start }}'
            step: 0
            stop: !datetime '{{ app.time.inference_stop }}'
          forecast:
            coords: !dict '{{ vx.common.wxvx.forecast.coords }}'
            projection:
              proj: latlon
            name: nested_global
            path: '{{ meta.post_files }}/nested-global.{{ yyyymmdd[:4] }}-{{ yyyymmdd[4:6] }}-{{ yyyymmdd[6:8] }}T{{ hh }}.{{ "%02d" % fh }}h.nc'
          leadtimes:
            start: '{{ app.time.leadtime }}'
            step: '{{ app.time.step }}'
            stop: '{{ app.time.leadtime }}'
          meta: !dict '{{ vx.common.wxvx.meta | replace("TRUTH", "grid2grid") | replace("EXTENT", "global") }}'
          variables:
            t2m:
              level_type: heightAboveGround
              levels:
              - 2
              name: 2t
            gh:
              level_type: isobaricInhPa
              levels:
              - 500
              name: gh
            sp:
              level_type: surface
              name: sp
            t:
              level_type: isobaricInhPa
              levels:
              - 850
              name: t
            u:
              level_type: isobaricInhPa
              levels:
              - 250
              name: u
            u10:
              level_type: heightAboveGround
              levels:
              - 10
              name: 10u
            v:
              level_type: isobaricInhPa
              levels:
              - 250
              name: v
            v10:
              level_type: heightAboveGround
              levels:
              - 10
              name: 10v
          truth:
            name: GFS
            type: grid
            url: https://noaa-gfs-bdp-pds.s3.amazonaws.com/gfs.{{ yyyymmdd }}/{{ hh }}/atmos/gfs.t{{ hh }}z.pgrb2.0p25.f{{ "%03d" % fh }}
          ncdiffs: true
          regrid:
            method: NEAREST
            to: forecast
          paths: !dict '{{ vx.common.paths_grid | replace("TRUTH", "grid2grid") | replace("EXTENT", "global") }}'
    lam:
      platform: !dict '{{ app.platform }}'
      wxvx:
        execution:
          batchargs:
            cores: 1
            export: false
            partition: '{{ app.partitions.netaccess }}'
            walltime: 00:30:00
            rundir: '{{ vx.grid2grid.lam.wxvx.rundir }}'
          envcmds: !list '{{ vx.common.execution.envcmds }}'
          executable: wxvx -c wxvx-grid2grid-lam.yaml -t plots -f
        name: grid2grid-lam
        prewxvx:
          name: lam
          eagle_tools:
            forecast_path: '{{ inference.anemoi.output_path }}'
            freq: '{{ app.time.freq }}'
            lead_time: !int '{{ app.time.leadtime }}'
            lam_index: 64220
            lcc_info:
              n_x: 338
              n_y: 190
            levels:
            - 250
            - 500
            - 850
            start_date: '{{ app.time.inference_start }}'
            end_date: '{{ app.time.inference_stop }}'
            vars_of_interest: !list '{{ vx.common.wxvx.variables.keys() | list }}'
            output_path: '{{ val.vx.rundir }}/postprocessed_files/{{ prewxvx.lam.prewxvx.name }}'
            model_type: nested-lam
          rundir: '{{ val.vx.rundir }}/prewxvx/{{ prewxvx.lam.prewxvx.name }}'
        rundir: '{{ val.vx.rundir }}/grid2grid/lam'
        wxvx:
          cycles: !dict '{{ vx.common.wxvx.cycles }}'
          truth:
            name: HRRR
            type: grid
            url: https://noaa-hrrr-bdp-pds.s3.amazonaws.com/hrrr.{{ yyyymmdd }}/conus/hrrr.t{{ hh }}z.wrfprsf{{ "%02d" % fh }}.grib2
          forecast:
            coords: !dict '{{ vx.common.wxvx.forecast.coords }}'
            name: nested_lam
            path: '{{ meta.post_files }}/nested-lam.{{ yyyymmdd[:4] }}-{{ yyyymmdd[4:6] }}-{{ yyyymmdd[6:8] }}T{{ hh }}.{{ "%02d" % fh }}h.nc'
            projection:
              a: 6371229
              b: 6371229
              lat_0: 38.5
              lat_1: 38.5
              lat_2: 38.5
              lon_0: 262.5
              proj: lcc
          leadtimes: !dict '{{ vx.common.wxvx.leadtimes }}'
          meta: !dict '{{ vx.common.wxvx.meta | replace("TRUTH", "grid2grid") | replace("EXTENT", "lam") }}'
          ncdiffs: !bool '{{ vx.grid2grid.global.wxvx.wxvx.ncdiffs }}'
          paths: !dict '{{ vx.common.paths_grid | replace("TRUTH", "grid2grid") | replace("EXTENT", "lam") }}'
          regrid: !dict '{{ vx.grid2grid.global.wxvx.wxvx.regrid }}'
          variables: !dict '{{ vx.common.wxvx.variables }}'
  grid2obs:
    global:
      platform: !dict '{{ app.platform }}'
      wxvx:
        execution:
          batchargs:
            cores: 1
            export: false
            partition: '{{ app.partitions.netaccess }}'
            walltime: 00:30:00
            rundir: '{{ vx.grid2obs.global.wxvx.rundir }}'
          envcmds: !list '{{ vx.common.execution.envcmds }}'
          executable: wxvx -c wxvx-grid2obs-global.yaml -t plots -f
        name: grid2obs-global
        prewxvx: !dict '{{ prewxvx.global.prewxvx }}'
        rundir: '{{ val.vx.rundir }}/grid2obs/global'
        wxvx:
          cycles:
            start: !datetime '{{ app.time.inference_start }}'
            step: 0
            stop: !datetime '{{ app.time.inference_stop }}'
          forecast:
            coords: !dict '{{ vx.common.wxvx.forecast.coords }}'
            name: '{{ vx.grid2grid.global.wxvx.wxvx.forecast.name }}'
            projection: !dict '{{ vx.grid2grid.global.wxvx.wxvx.forecast.projection }}'
            path: '{{ meta.post_files }}/nested-global.{{ yyyymmdd[:4] }}-{{ yyyymmdd[4:6] }}-{{ yyyymmdd[6:8] }}T{{ hh }}.{{ "%02d" % fh }}h.nc'
          leadtimes:
            start: '{{ app.time.leadtime }}'
            step: '{{ app.time.step }}'
            stop: '{{ app.time.leadtime }}'
          meta: !dict '{{ vx.common.wxvx.meta | replace("TRUTH", "grid2obs") | replace("EXTENT", "global") }}'
          variables:
            t2m:
              level_type: heightAboveGround
              levels:
              - 2
              name: 2t
            gh:
              level_type: isobaricInhPa
              levels:
              - 500
              name: gh
            sp:
              level_type: surface
              name: sp
            t:
              level_type: isobaricInhPa
              levels:
              - 850
              name: t
            u:
              level_type: isobaricInhPa
              levels:
              - 250
              name: u
            u10:
              level_type: heightAboveGround
              levels:
              - 10
              name: 10u
            v:
              level_type: isobaricInhPa
              levels:
              - 250
              name: v
            v10:
              level_type: heightAboveGround
              levels:
              - 10
              name: 10v
          truth:
            name: PREPBUFR
            type: point
            url: https://noaa-reanalyses-pds.s3.amazonaws.com/observations/reanalysis/conv/prepbufr/{{ yyyymmdd[:4] }}/{{ yyyymmdd[4:6] }}/prepbufr/gdas.{{ yyyymmdd }}.t{{ hh }}z.prepbufr.nr
          regrid:
            method: BILIN
            to: G104
          paths: !dict '{{ vx.common.paths_obs | replace("TRUTH", "grid2obs") | replace("EXTENT", "global") }}'
    lam:
      platform: !dict '{{ app.platform }}'
      wxvx:
        execution:
          batchargs:
            cores: 1
            export: false
            partition: '{{ app.partitions.netaccess }}'
            rundir: '{{ vx.grid2obs.lam.wxvx.rundir }}'
            walltime: 00:30:00
          envcmds: !list '{{ vx.common.execution.envcmds }}'
          executable: wxvx -c wxvx-grid2obs-lam.yaml -t plots -f
        name: grid2obs-lam
        prewxvx:
          name: lam
          eagle_tools:
            forecast_path: '{{ inference.anemoi.output_path }}'
            freq: '{{ app.time.freq }}'
            lead_time: !int '{{ app.time.leadtime }}'
            lam_index: 64220
            lcc_info:
              n_x: 338
              n_y: 190
            levels:
            - 250
            - 500
            - 850
            start_date: '{{ app.time.inference_start }}'
            end_date: '{{ app.time.inference_stop }}'
            vars_of_interest: !list '{{ vx.common.wxvx.variables.keys() | list }}'
            output_path: '{{ val.vx.rundir }}/postprocessed_files/{{ prewxvx.lam.prewxvx.name }}'
            model_type: nested-lam
          rundir: '{{ val.vx.rundir }}/prewxvx/{{ prewxvx.lam.prewxvx.name }}'
        rundir: '{{ val.vx.rundir }}/grid2obs/lam'
        wxvx:
          truth: !dict '{{ vx.grid2obs.global.wxvx.wxvx.truth }}'
          cycles: !dict '{{ vx.common.wxvx.cycles }}'
          forecast:
            coords: !dict '{{ vx.common.wxvx.forecast.coords }}'
            name: '{{ vx.grid2grid.lam.wxvx.wxvx.forecast.name }}'
            path: '{{ meta.post_files }}/nested-lam.{{ yyyymmdd[:4] }}-{{ yyyymmdd[4:6] }}-{{ yyyymmdd[6:8] }}T{{ hh }}.{{ "%02d" % fh }}h.nc'
            projection: !dict '{{ vx.grid2grid.lam.wxvx.wxvx.forecast.projection }}'
          leadtimes: !dict '{{ vx.common.wxvx.leadtimes }}'
          meta: !dict '{{ vx.common.wxvx.meta | replace("TRUTH", "grid2obs") | replace("EXTENT", "lam") }}'
          paths: !dict '{{ vx.common.paths_obs | replace("TRUTH", "grid2obs") | replace("EXTENT", "lam") }}'
