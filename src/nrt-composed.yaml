zarrs:
  common:
    execution:
      batchargs:
        cores: 1
        export: false
        partition: '{{ app.partitions.netaccess }}'
        rundir: '{{ val.data.rundir }}'
        walltime: 00:10:00
        --mem-per-cpu: 3G
      envcmds: !list '{{ val.slurm_script + val.zarrs.envcmds }}'
      mpiargs:
      - --export=ALL
      mpicmd: '{{ "srun" if app.platform.scheduler == "slurm" else "mpiexec" }}'
  gfs:
    zarr:
      execution:
        batchargs: !dict '{{ zarrs.common.execution.batchargs }}'
        envcmds: !list '{{ zarrs.common.execution.envcmds }}'
        executable: ufs2arco ufs2arco-gfs.yaml --overwrite
        mpiargs: !list '{{ zarrs.common.execution.mpiargs }}'
        mpicmd: '{{ zarrs.common.execution.mpicmd }}'
      name: gfs
      rundir: '{{ val.data.rundir }}'
      ufs2arco:
        directories: !dict '{{ ufs2arco.dirs | replace("X", "gfs") }}'
        mover: !dict '{{ ufs2arco.mover }}'
        multisource: !remove ''
        target: !dict '{{ ufs2arco.target }}'
        transforms:
          horizontal_regrid:
            regridder_kwargs: !dict '{{ dict(ufs2arco.regridder, filename="conservative_weights_gfs.nc") }}'
            target_grid_path: '{{ grids_and_meshes.rundir}}/{{ val.filenames.gfs_target_grid }}'
        source: !dict '{{ dict(ufs2arco.source, name="gfs_archive", slices=ufs2arco.slices) }}'
    platform: !dict '{{ app.platform }}'
  hrrr:
    zarr:
      execution:
        batchargs: !dict '{{ zarrs.common.execution.batchargs }}'
        envcmds: !list '{{ zarrs.common.execution.envcmds }}'
        executable: ufs2arco ufs2arco-hrrr.yaml --overwrite
        mpiargs: !list '{{ zarrs.common.execution.mpiargs }}'
        mpicmd: '{{ zarrs.common.execution.mpicmd }}'
      name: hrrr
      rundir: '{{ val.data.rundir }}'
      ufs2arco:
        directories: !dict '{{ ufs2arco.dirs | replace("X", "hrrr") }}'
        mover: !dict '{{ ufs2arco.mover }}'
        multisource: !remove ''
        target: !dict '{{ ufs2arco.target }}'
        transforms:
          horizontal_regrid:
            regridder_kwargs: !dict '{{ dict(ufs2arco.regridder, filename="conservative_1059x1799_211x359.nc") }}'
            target_grid_path: '{{ grids_and_meshes.rundir }}/{{ val.filenames.hrrr_target_grid }}'
          rotate_vectors:
            vector_pairs:
            - - u
              - v
            - - u10
              - v10
        source: !dict '{{ dict(ufs2arco.source, name="aws_hrrr_archive") }}'
    platform: !dict '{{ app.platform }}'
