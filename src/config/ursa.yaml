# Configuration for the NOAA RDHPCS Ursa platform.

# yamllint disable rule:anchors rule:line-length

app:
  gpu:
    batchargs: &gpu-batchargs
      gres: 'gpu:h100:1'
      nodes: 1
      partition: u1-h100
      queue: gpuwf
      native: '--gres gpu:h100:1'
  partitions:
    netaccess: u1-service
    compute: u1-compute
  platform: &platform
    account: epic
    scheduler: slurm
  queues:
    batch: batch
zarrs:
  common:
    execution:
      batchargs:
        --mem-per-cpu: 3G
        memory: 8G
      envcmds: !list '{{ ["source /etc/profile.d/profile-slurm.sh"] + zarrs.common.envcmds }}'
      mpiargs:
        - "--export=ALL"
