# Configuration for the NOAA RDHPCS Ursa platform.

# yamllint disable rule:anchors rule:line-length

app:
  gpu:
    batchargs: &gpu-batchargs
      --gres: 'gpu:h100:1'
      nodes: 1
      partition: u1-h100
      queue: gpuwf
  launcher: srun --export=ALL
  partitions:
    netaccess: u1-service
  platform: &platform
    account: epic
    scheduler: slurm
inference:
  execution:
    envcmds: !extend
      - source /etc/profile.d/profile-slurm.sh
training:
  execution:
    envcmds: !extend
      - source /etc/profile.d/profile-slurm.sh
zarrs:
  common:
    execution:
      batchargs:
        --mem-per-cpu: 3G
      envcmds: !extend
        - source /etc/profile.d/profile-slurm.sh
      mpiargs:
        - "--export=ALL"
