# yamllint disable rule:anchors rule:line-length

channels:
  - nodefaults
  - conda-forge
  - ufs-community
dependencies:
  - matplotlib >=3.7.1,<3.9 # low bound per anemoi-training; high bound per matplotlib Issue 28317
  - flash-attn 2.7.*
  - mpi4py 4.1.*
  - numpy 1.26.4*
  - pip
  - python 3.12
  - pytorch 2.6.*
  - torch-geometric 2.6.*
  - torchvision 0.21.*
  - setuptools 81.0.*
  - triton 3.6.*
  - uwtools 2.16.*
  - pip:
    - anemoi-inference==0.9.1
    - anemoi-models==0.12.0
    - anemoi-datasets==0.5.30
    - anemoi-graphs==0.8.2
    - anemoi-transform==0.1.21
    - anemoi-utils==0.4.42
    - eagle-tools==0.8.1
